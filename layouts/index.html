{{ define "body" }}
<script> 
jQuery(document).ready(function($) {
    var animation = false;

    var postFilenames = [
        {{ range where .Site.RegularPages "Section" "posts" }}
        "{{ with .File }}{{ path.BaseName .Dir }}{{ end }}",
        {{ end }}
    ];

    var lessCommands = [
        "whois",
        {{ if .Site.Params.social }}"social",{{ end }}
        {{ if .Site.Params.work }}"work",{{ end }}
        {{ if .Site.Params.education }}"education",{{ end }}
        {{ if .Site.Params.skills }}"skills",{{ end }}
        {{ if .Site.Params.softSkills }}"softskills",{{ end }}
        {{ if .Site.Params.languages }}"languages",{{ end }}
        {{ if .Site.Params.projects }}"projects",{{ end }}
        {{ if .Site.Params.publications }}"publications",{{ end }}
        {{ if .Site.Params.certifications }}"certifications",{{ end }}
        {{ if .Site.Params.misc }}"{{ .Site.Params.misc.commandName | default "other" }}",{{ end }}
        {{ if not .Site.Params.Source }}"source",{{ end }}
        "all"
    ];

    var commands = {
        help: "shows help",
        less: {
            description: "Use less as output method for commands",
            args: [
                ...lessCommands{{ if .Site.Params.blog.enabled }},
                ...postFilenames{{ end }}
            ]
        },
        whois: "list basic details",
        {{ if .Site.Params.social }}
        social: "list social networks",
        {{ end }}
        {{ if .Site.Params.work }}
        work: "list work experience",
        {{ end }}
        {{ if .Site.Params.education }}
        education: "list education",
        {{ end }}
        {{ if .Site.Params.skills }}
        skills: "list core skills",
        {{ end }}
        {{ if .Site.Params.softSkills }}
        softskills: "list soft skills",
        {{ end }}
        {{ if .Site.Params.languages }}
        languages: "list spoken languages",
        {{ end }}
        {{ if .Site.Params.projects }}
        projects: "list projects",
        {{ end }}
        {{ if .Site.Params.publications }}
        publications: "list publications",
        {{ end }}
        {{ if .Site.Params.certifications }} 
            certifications: "list certifications",
        {{ end }}
        {{ if .Site.Params.startxLocation }}
            startx: "starts graphical environment",
        {{ end }}
        {{ if .Site.Params.misc }}
            {{ .Site.Params.misc.commandName | default "other" }}: "{{.Site.Params.misc.title }}",
        {{ end }}
        {{ if not .Site.Params.Source }}
            source: "shows details about template powering this website",
        {{ end }}
        {{ if .Site.Params.version }}
            version: "Current version",
        {{ end }}
        {{ if .Site.Params.exitLocation }}
            exit: "exit the terminal",
        {{ end }}
        {{ if .Site.Params.blog.enabled }}
            posts: "List all posts",
            ls: "List all posts",
            cat: {
                description: "Open a post",
                args: postFilenames
             },
        {{ end }}
        all: "Show all details about me",
    };

    function progressBar(number) {
        var barLength = Math.round(number / 10);
        var barFilled = Array(barLength + 1).join("&#9611;");
        var barBlank= Array(11 - barLength).join("&#9617;");

        return barFilled + barBlank
    }

    // Calculate the tabbing to keep commands and descriptions aligned in the help message
    function padKey(key, length) {
        return key + ' '.repeat(length - key.length);
    }

    function commandsHelp() {
        let longestKeyLength = Math.max(...Object.keys(commands).map(key => key.length));

        let helpText = ""
        for (let key in commands) {
          if (commands.hasOwnProperty(key)) {
              commandValue = commands[key];
              description = typeof commandValue === 'string' ? commandValue : commandValue.description;
              helpText += ` ${padKey(key, longestKeyLength)}\t${description}\n`
          }
        }
        return helpText
    }

    var help = '\n[[b;white;]usage:]\n' +
                '\n <command>'.padEnd(17) + '- execute the command\n' +
                ' less <command>'.padEnd(16) + '- use less to display the output\n\n' +
                {{ if .Site.Params.blog.enabled }}
                  ' less <post>'.padEnd(16) + '- use less to display a post\n' +
                  ' cat <post>'.padEnd(16) + '- use cat to print a post\n' +
                {{ end }}
                '\n[[b;white;]Available commands:]\n' + 
               commandsHelp();

    var whois = [
    {{ with .Site.Params.whois.details }} 
        '[[b;grey;]Name:]\t\t\t{{ .name }}\n' + 
        '[[b;grey;]Profession:]\t\t{{ .profession }}\n' +
        '[[b;grey;]Location:]\t\t{{ .location }}\n' +
        {{ if .email }}
        '[[b;grey;]Email:]\t\t\t{{ .email }}\n' +
        {{ end }}
        {{ if .homelink }}
        '[[b;grey;]Homepage:]\t\t{{ .homelink }}\n' +
        {{ end }}
        {{ if .description }}
        '{{ .description }}' +
        {{ end }}
        '\r',
    {{ end }}
    ];

    function social() { 
        var hideName = false;
        let sMap = { 
            {{ with .Site.Params.social.details }} 
                {{ range. }}
                {{ .name }}: "{{ .url }}",
                {{ end }}
            {{ end }}
        };

        {{ if .Site.Params.social.settings.hideName }}
        hideName = true
        {{ end }}
        socialText = []
        for (let key in sMap) {
            if (sMap.hasOwnProperty(key)) {
                if (hideName) {
                    socialText.push(sMap[key]);
                } else { 
                    let longestKeyLength = Math.max(...Object.keys(sMap).map(key => key.length));
                    socialText.push(`${padKey(key, longestKeyLength)}\t${sMap[key]}`)
                };
            }
        }

        return socialText
    };

    function posts(term) {
      {{ if .Site.Params.blog.lsClassic }}
        // classic ls output
        $.ajax({
            url: "/posts/index.xml",
            type: 'GET',
            dataType: 'xml',
            success: function(xml) {
                // let output = 'To read a post do: cat filename\n';
                let output = '\n';
                
                $(xml).find('item').each(function() {
                    let title = $(this).find('title').text();
                    let filename = $(this).find('filename').text();
                    let author = $(this).find('author').text() || "unknown";
                    let pubDate = $(this).find('pubDate').text();
                    
                    let dateObj = new Date(pubDate);
                    let date = dateObj.toLocaleDateString('en-US', { 
                        year: 'numeric', 
                        month: 'short', 
                        day: '2-digit' 
                    });
                    let line = `-r--r--r--  ${author.padEnd(12)}  ${date.padEnd(13)}  ${filename}`;
                    output += line + '\n';
                });
                
                term.echo(output);
            },
            error: function() {
            term.echo("Error: Could not load posts data");
            }
        });
      {{ else }}
        // Original output
        $.ajax({
            url: "posts/",
            type: 'GET',
            success: function(data) {
                term.echo(data, {raw: true}); 
            },
            error: function() {
                term.echo("Error: Could not load posts data");
            }
        });
      {{ end }}
    }

    var certifications = [
    {{ with .Site.Params.certifications.details }}
        {{ range . }}
            '---\n' +
            '[[b;{{ .color | default "grey" }};]{{ .certName }}]\n' +
            '{{ .date }}\n' +
            {{ if .company }}
            '{{ .company }}\n' +
            {{ end }}
            {{ if .description }}
            '{{ .description }}\n' +
            {{ end }}
            {{ if .badge }}
            'Badge: \t{{ .badge }}\n' +
            {{ end }}
            '\r',
        {{ end }}
    {{ end }}
    ];
    
    var work = [
    {{ with .Site.Params.work.details }}
        {{ range .}}
            '---\n' +
            '[[b;{{ .color | default "grey" }};]{{ .jobTitle }}]\n' +
            '{{ .company }}\n' +
            '{{ .location}}\n' +
            '{{ .date }}\n' +
            '\n' +
            '{{ .description }}' +
            '\r',
        {{ end }}
    {{ end }}
    ];

    var education = [
    {{ with .Site.Params.education.details }}
        {{ range . }}
            '---\n' +
            '[[b;{{ .color | default "grey" }};]{{ .courseName }}]\n' +
            '{{ .date }}\n' +
            {{ if .description }}
                "{{ .description }}\n" +
            {{ end }}
            "\r",
        {{ end }}
    {{ end }}
    ];

    var projects = [
    {{ with .Site.Params.projects.details }}
        {{ range .}}
            '---\n' +
            '[[b;{{ .color | default "grey" }};]{{ .title }}]\n' +
            '{{ .date }}\n' +
            '{{ .link }}\n' +
            {{ if .description }}
            '{{ .description }}\n' +
            {{ end }}
            "\r",
      {{ end }}
    {{ end }}
    ];

    var publications = [
    {{ with .Site.Params.publications.details }}
        {{ range .}}
            '---\n' +
            '[[b;{{ .color | default "grey" }};]{{ .title }}]\n' +
            {{ if .authors }}
            '{{ .authors }}\n' +
            {{ end }}
            {{ if .venue }}
            '{{ .venue }}\n' +
            {{ end }}
            '{{ .date }}\n' +
            {{ if .link }}
            '{{ .link }}\n' +
            {{ end }}
            {{ if .description }}
            '{{ .description }}\n' +
            {{ end }}
            "\r",
      {{ end }}
    {{ end }}
    ];

    var skills = [
    {{ with .Site.Params.skills.details }}
        {{ range . }}
            '[[b;{{ .color | default "grey" }};]{{ .name }}:]\n' +
            progressBar({{ .percentage }}) +
            '{{ .percentage }}' + '%\n' +
            {{ if .description }}
            '{{ .description }}\n' +
            {{ end }}
            '\r',
        {{ end }}
    {{ end }}
    ];

    var softSkills = [
    {{ with .Site.Params.softSkills.details }}
        {{ range . }}
            '[[b;{{ .color | default "grey" }};]{{ .name }}:]\n' +
            progressBar({{ .percentage }}) +
            '{{ .percentage }}' + '%\n' + 
            {{ if .description }}
            '{{ .description }}\n' +
            {{ end }}
            '\r',
        {{ end }}
    {{ end }}
    ];
  
    var languages = [
    {{ with .Site.Params.languages.details }}
        {{ range . }}
            '[[b;{{ .color | default "grey" }};]{{ .name }}:]\n' +
            progressBar({{ .percentage }})+ 
            '{{ .percentage }}' + '%\n' +
            {{ if .description }}
            '{{ .description }}\n' +
            {{ end }}
            '\r',
        {{ end }}
    {{ end }}
    ];

    var misc = [
         {{ with .Site.Params.misc }}
        '[[b;{{ .titleColor }};]{{ .title }}]\n' +
        '[[;{{ .contentColor }};]{{ .content }}]\n',
         {{ end }}
    ];

    var source =  '        _______            \n' +
                  '       |       |           \n' +
                  '       |       |           \n' +
                  '       |_______|_______    \n' +
                  '               |       |   \n' +
                  '               |       |   \n' +
                  ' ______________|_______|   \n' +
                  '|      |       |       |   \n' +
                  '|      |       |       |   \n' +
                  '|______|_______|_______|   \n' +
                  '[[;red;]May the source be with you]\n' +
                  '[[;grey;]https://github.com/coolapso/hugo-theme-terminalcv\n';

    var all = [ 
        whois,
        {{ if .Site.Params.social }}
        social(),
        {{ end }}
        {{ if .Site.Params.work }}
        work,
        {{ end }}
        {{ if .Site.Params.education }}
        education,
        {{ end }}
        {{ if .Site.Params.skills }}
        skills,
        {{ end }}
        {{ if .Site.Params.softSkills }}
        softSkills,
        {{ end }}
        {{ if .Site.Params.languages }}
        languages,
        {{ end }}
        {{ if .Site.Params.projects }}
        projects,
        {{ end }}
        {{ if .Site.Params.publications }}
        publications,
        {{ end }}
        {{ if .Site.Params.certifications }}
        certifications,
        {{ end }}
        {{ if .Site.Params.misc }}
        misc,
        {{ end }}
        {{ if .Site.Params.source }}
        source,
        {{ end }}
    ]

    $('body').terminal(function(command, term) {
  
        var useLess = false;
        {{if .Site.Params.useLess }}
        useLess = true;
        {{ end }}

        function echoArray(array, options) {
            var opts = options || {};
            
            if (useLess) {
                if (opts.raw) {
                    var content = array[0];
                    var export_data = term.export_view();
                    
                    term.clear();
                    term.echo(content, {raw: true});
                    
                    term.push(function(command) {}, {
                        prompt: ':',
                        keydown: function(e) {
                            if (e.which === 81 || e.which === 113) { // Q
                                term.pop();
                                term.import_view(export_data);
                                return false;
                            }
                        }
                    });
                } else {
                    term.less(array);
                }
            } else {
                for (i = 0; i < array.length; i += 1) {
                    term.echo(array[i], options || {});
                }
            }
        }

        function catPost(term, postdir) {
        url = "/posts/" + postdir + "/";
        $.ajax({
            url: url,
            type: 'GET',
            success: function(data) {
                // term.echo(data, {raw: true});
                echoArray([data], {raw: true});
            },
            error: function() {
                term.echo("Error: Could not load post " + postdir);
            }
        });
    }
        //Function used by StartX to draw the progressBar
        function progress(percent, width) {
            var size = Math.round(width*percent/100);
            var left = '', taken = '', i;
            for (i=size; i--;) {
                taken += '=';
            }
            if (taken.length > 0) {
                taken = taken.replace(/=$/, '>');
            }
            for (i=width-size; i--;) {
                left += ' ';
            }
            return '[' + taken + left + '] ' + percent + '%';
        }

        function loading () {
            var i = 0, size = 30;
            prompt = term.get_prompt();
            string = progress(0, size);
            term.set_prompt(progress);
            animation = true;
            (function loop() {
                string = progress(i++, size);
                term.set_prompt(string);
                if (i < 100) {
                    timer = setTimeout(loop, 10);
                } else {
                    term.echo(progress(i, size) + ' [[b;green;]OK]').set_prompt(prompt);
                    animation = false
                }
            })();
        }

        cmdParts = command.split(/[ ]+/);
        if (cmdParts[0] == 'less') {
            useLess = true;
            cmdParts.shift();

            let target = cmdParts[0];

            if (!target) { 
                term.echo("less: missing argument");
                return;
            } else if (postFilenames.includes(target)) {
                // its a blogpost
                catPost(term, target);
                return;
            } 
        } 
                    
        switch(cmdParts[0]) {
            case 'whois':
                {{ if .Site.Params.whois.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(whois);
                break;
            {{ if .Site.Params.social }}
            case 'social':
                {{ if .Site.Params.social.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(social());
                break;
            {{ end }}
            {{ if .Site.Params.work }}
            case 'work':
                {{ if .Site.Params.work.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(work);
                break;
            {{ end }}
            {{ if .Site.Params.education }}
            case 'education':
                {{ if .Site.Params.education.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(education);
                break;
            {{ end }}
            {{ if .Site.Params.skills }}
            case 'skills':
                {{ if .Site.Params.skills.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(skills);
                break;
            {{ end }}
            {{ if .Site.Params.softSkills }}
            case 'softskills':
                {{ if .Site.Params.softskills.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(softSkills);
                break;
            {{ end }}
            {{ if .Site.Params.languages }}
            case 'languages':
                {{ if .Site.Params.languages.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(languages);
                break;
            {{ end }}
            {{ if .Site.Params.projects }}
            case 'projects':
                {{ if .Site.Params.projects.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(projects);
                break;
            {{ end }}
            {{ if .Site.Params.publications }}
            case 'publications':
                {{ if .Site.Params.publications.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(publications);
                break;
            {{ end }}
            case 'certifications':
                {{ if .Site.Params.certifications.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(certifications);
                break;
            case '{{ .Site.Params.misc.commandName | default "misc"}}':
                {{ if .Site.Params.misc.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(misc);
                break;
            case 'help':
            case '?':
                term.echo(help);
                break;
            case 'all':
                {{ if .Site.Params.all.settings.useLess }}
                useLess = true;
                {{ end }}
                echoArray(all.flat(1));
                break;
            {{ if .Site.Params.startxLocation }}
            case 'startx':
                term.echo("loading ...");
                loading();
                setTimeout(function(){window.location = "{{ .Site.Params.startxLocation }}"}, 2000);
                break;
            {{ end }}
            case ':(){:|:&};:':
                term.echo("nice try");
                break;
            case 'source':
                {{ if .Site.Params.misc.settings.useLess }}
                useLess = true;
                {{ end }}
                term.echo(source);
                break;
            case 'exit':
            {{ if .Site.Params.exitLocation }}
                term.echo("terminating ... ");
                loading();
                setTimeout(function(){window.location = '{{ .Site.Params.exitLocation }}'}, 2000);
                break;
            {{ else }}
                term.echo("Terminating session, thanks for visiting");
                loading();
                setTimeout(function() {
                  term.pause();
                  term.clear();
                  term.echo("{{ .Site.Params.exitMessage }}");
                }, 2000);
                break;
            {{ end }}
            {{ if .Site.Params.version }}
            case 'version':
                term.echo("{{ .Site.Params.version }}");
                break;
            {{ end }}
            {{ if .Site.Params.blog.enabled }}
            case 'cat':
                if (cmdParts.length < 2) {
                    term.echo("Usage: cat <filename>");
                } else {
                    var  postdir = cmdParts[1];
                    catPost(term, postdir);
                }
                break;
            case 'posts':
            case 'ls':
                posts(term);
                break;
            {{ end }}
            case '':
                break;
            default:
                term.echo("\nunknown command: " + command + "\n" +
                          "please type 'help' or '?' for a list of available commands\n");
        }

    }, {

        {{ if .Site.Params.bootsequence }} 
          greetings: false,
          onInit: function(term) {
          term.pause();
          term.typing('echo', 1, '{{ .Site.Params.bootsequence }}', function() {
            term.clear();
            {{ if .Site.Params.greetingbanner }}
              term.echo("[[b;{{ .Site.Params.greetingBannerColor | default "white" }};]{{ .Site.Params.greetingBanner }}{{ .Site.Params.version }}]");
              term.echo("[[b;{{ .Site.Params.greetingColor | default "white" }};]{{ .Site.Params.greeting }}]");
            {{ else }}
              term.echo("[[b;{{ .Site.Params.greetingColor | default "white" }};]{{ .Site.Params.greeting }}]");
            {{ end }}
          });
          term.resume();
          },
        {{ else }} 
          greetings: "[[b;{{ .Site.Params.greetingColor | default "white" }};]{{ .Site.Params.greeting }}]",
        {{ end }}

        prompt: '{{ with .Site.Params.prompt }}{{ with .core }}[[;{{ .beforeColor | default "grey" }};]{{ .before }}][[;{{ .color | default "grey" }};]{{ .text }}][[;{{ .afterColor | default "gey" }};]{{ .after }}]{{ end }}{{ with .separator }}[[;{{ .separatorColor | default "grey" }};]{{ .text }}]{{ end }}{{ with .path }}[[;{{ .beforeColor | default "grey" }};]{{ .before }}][[;{{ .color | default "grey" }};]{{ .text | default ":~$" }}][[;{{ .afterColor | default "grey" }};]{{ .after }}]{{ end }}{{ with .extra }}[[;{{ .color | default "grey" }};]{{ .text }}]{{ end }}{{ end }}',

        keydown: function(e, term) {
            if (animation) {
                if (e.which == 68 && e.ctrlKey) { // CTRL+D
                    clearTimeout(timer);
                    animation = false;
                    term.echo(string + ' [[b;red;]FAIL]')
                    .set_prompt(prompt);
                }
                return false;
            }
        },
        autocompleteMenu: true,
        {{ if .Site.Params.blog.enabled }}
          // own completion funciton with arguments support
          completion: function(string) {
              var command = this.get_command();
              var parts = command.split(/\s+/);
              var commandName = parts[0];
              
              // Complete command names
              if (parts.length === 1 || command.indexOf(' ') === -1) {
                  return Object.keys(commands).filter(function(cmd) {
                      return cmd.startsWith(string);
                  });
              }
              
              // Arguments part for any command which has them
              if (commands[commandName] && commands[commandName].args) {
                  return commands[commandName].args.filter(function(arg) {
                      return arg.startsWith(string);
                  });
              }
          }
        {{ else }}
          completion: Object.keys(commands)
        {{ end }}
        
    });
});
</script>
{{ end }}
